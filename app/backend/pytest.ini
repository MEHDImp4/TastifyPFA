[pytest]
DJANGO_SETTINGS_MODULE = tastify_backend.settings.test
python_files = tests.py test_*.py *_tests.py
addopts = --reuse-db --cov=apps --cov-report=xml --cov-report=term
filterwarnings =
    ignore:Converter 'drf_format_suffix' is already registered.*:django.utils.deprecation.RemovedInDjango60Warning
