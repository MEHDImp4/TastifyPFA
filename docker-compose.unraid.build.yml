services:
  backend:
    build:
      context: ./app/backend

  backoffice-app:
    build:
      context: ./app/frontend/backoffice-app
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}

  client-app:
    build:
      context: ./app/frontend/client-app
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
