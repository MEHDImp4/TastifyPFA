events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # GERANT back-office SPA (Vite dev server)
    upstream backoffice {
        server backoffice:3000;
    }
    # SERVEUR salle SPA
    upstream salle {
        server salle:3001;
    }
    # CUISINIER KDS SPA
    upstream kds {
        server kds:3002;
    }
    # CLIENT portail SPA
    upstream portail {
        server portail:3003;
    }
    # Django/Daphne ASGI backend
    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # REST API
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django Channels WebSocket (Phase 13 onwards)
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # GERANT back-office with Vite HMR support
        location /back-office/ {
            proxy_pass http://backoffice;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location /salle/ {
            proxy_pass http://salle;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location /kds/ {
            proxy_pass http://kds;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Portail Client at root (catches all unmatched)
        location / {
            proxy_pass http://portail;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
