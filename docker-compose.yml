services:
  db:
    image: mysql:8.0
    env_file: .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tastify-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - tastify-network

  backend:
    build:
      context: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tastify-network

  backoffice:
    build:
      context: ./frontend/back-office
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/back-office:/app
      - ./frontend/_shared:/app/_shared
      - /app/node_modules
    networks:
      - tastify-network

  portail:
    build:
      context: ./frontend/portail-client
    ports:
      - "3003:3003"
    volumes:
      - ./frontend/portail-client:/app
      - ./frontend/_shared:/app/_shared
      - /app/node_modules
    networks:
      - tastify-network

networks:
  tastify-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
