services:
  db:
    image: mysql:8.0
    env_file: .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tastify-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - tastify-network

  backend:
    image: tastifypfa-backend-dev
    build:
      context: ./app/backend
    command: daphne -b 0.0.0.0 -p 8000 --ping-interval 25 --ping-timeout 60 tastify_backend.asgi:application
    env_file: .env
    environment:
      COLLECTSTATIC_ON_STARTUP: "1"
      SEED_ON_STARTUP: "1"
      SEED_COMMAND: "seed_all"
    ports:
      - "8000:8000"
    volumes:
      - ./app/backend:/app
      - ./app/backend/media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tastify-network

  celery-worker:
    image: tastifypfa-backend-dev
    env_file: .env
    command: celery -A tastify_backend worker --loglevel=info --concurrency=2
    volumes:
      - ./app/backend:/app
      - ./app/backend/media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tastify-network

  celery-beat:
    image: tastifypfa-backend-dev
    env_file: .env
    command: celery -A tastify_backend beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./app/backend:/app
      - ./app/backend/media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tastify-network

  backoffice-app:
    build:
      context: ./app/frontend/backoffice-app
    ports:
      - "3000:3000"
    volumes:
      - ./app/frontend/backoffice-app:/app
      - /app/node_modules
    networks:
      - tastify-network

  client-app:
    build:
      context: ./app/frontend/client-app
    ports:
      - "3003:3003"
    volumes:
      - ./app/frontend/client-app:/app
      - /app/node_modules
    networks:
      - tastify-network

networks:
  tastify-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
