name: QA CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - ".planning/**"
      - "docs/brain/**"
      - "dashboard.html"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      full_run:
        description: Force the full QA pipeline even if path analysis would skip jobs.
        required: false
        default: false
        type: boolean

concurrency:
  group: qa-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: Detect impacted surfaces
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.detect.outputs.frontend }}
      backend: ${{ steps.detect.outputs.backend }}
      client: ${{ steps.detect.outputs.client }}
      backoffice: ${{ steps.detect.outputs.backoffice }}
      ci: ${{ steps.detect.outputs.ci }}
      full_run: ${{ steps.detect.outputs.full_run }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          INPUT_FULL_RUN: ${{ github.event.inputs.full_run || 'false' }}
        run: |
          set -euo pipefail

          full_run=false
          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$INPUT_FULL_RUN" == "true" ]]; then
            full_run=true
          fi

          if [[ "$full_run" == "true" ]]; then
            {
              echo "frontend=true"
              echo "backend=true"
              echo "client=true"
              echo "backoffice=true"
              echo "ci=true"
              echo "full_run=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base_sha="$PR_BASE_SHA"
            head_sha="$PR_HEAD_SHA"
          elif [[ -n "$EVENT_BEFORE" && "$EVENT_BEFORE" != "0000000000000000000000000000000000000000" ]]; then
            base_sha="$EVENT_BEFORE"
            head_sha="$EVENT_SHA"
          else
            {
              echo "frontend=true"
              echo "backend=true"
              echo "client=true"
              echo "backoffice=true"
              echo "ci=true"
              echo "full_run=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
          echo "Changed files:"
          echo "$changed_files"

          match_any() {
            local pattern="$1"
            echo "$changed_files" | grep -E -q "$pattern"
          }

          frontend=false
          backend=false
          client=false
          backoffice=false
          ci=false

          if match_any '^app/frontend/' || match_any '^(package\.json|package-lock\.json|scripts/testing/run-suite\.mjs|docker-compose\.yml|\.github/workflows/backoffice-ci\.yml|TESTING\.md)$'; then
            frontend=true
          fi
          if match_any '^app/backend/' || match_any '^(docker-compose(\.ci|\.preview)?\.yml|scripts/testing/run-suite\.mjs|\.github/workflows/backoffice-ci\.yml|TESTING\.md)$'; then
            backend=true
          fi
          if match_any '^app/frontend/client-app/' || match_any '^(docker-compose(\.ci|\.preview)?\.yml|scripts/testing/run-suite\.mjs|\.github/workflows/backoffice-ci\.yml|TESTING\.md)$'; then
            client=true
          fi
          if match_any '^app/frontend/backoffice-app/' || match_any '^(docker-compose(\.ci|\.preview)?\.yml|scripts/testing/run-suite\.mjs|\.github/workflows/backoffice-ci\.yml|TESTING\.md)$'; then
            backoffice=true
          fi
          if match_any '^\.github/workflows/' || match_any '^(scripts/testing/run-suite\.mjs|package\.json|package-lock\.json|docker-compose(\.ci|\.preview)?\.yml|TESTING\.md)$'; then
            ci=true
          fi

          {
            echo "frontend=$frontend"
            echo "backend=$backend"
            echo "client=$client"
            echo "backoffice=$backoffice"
            echo "ci=$ci"
            echo "full_run=false"
          } >> "$GITHUB_OUTPUT"

  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            app/frontend/backoffice-app/package-lock.json
            app/frontend/client-app/package-lock.json

      - name: Install backoffice dependencies
        working-directory: app/frontend/backoffice-app
        run: npm ci

      - name: Install client dependencies
        working-directory: app/frontend/client-app
        run: npm ci

      - name: Lint both frontends
        run: |
          npm --prefix app/frontend/backoffice-app run lint
          npm --prefix app/frontend/client-app run lint

      - name: Typecheck both frontends
        run: |
          npm --prefix app/frontend/backoffice-app run typecheck
          npm --prefix app/frontend/client-app run typecheck

      - name: Build both frontends
        run: |
          npm --prefix app/frontend/backoffice-app run build
          npm --prefix app/frontend/client-app run build

      - name: Run frontend unit tests
        run: |
          npm --prefix app/frontend/backoffice-app run test:unit
          npm --prefix app/frontend/client-app run test:unit

      - name: Run frontend coverage
        run: |
          npm --prefix app/frontend/backoffice-app run test:coverage
          npm --prefix app/frontend/client-app run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: .
          files: app/frontend/backoffice-app/coverage/lcov.info,app/frontend/client-app/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  dependency-security-audits:
    name: Dependency and security audits
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            app/frontend/backoffice-app/package-lock.json
            app/frontend/client-app/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        run: |
          npm --prefix app/frontend/backoffice-app ci
          npm --prefix app/frontend/client-app ci

      - name: Run npm production audits
        run: |
          npm --prefix app/frontend/backoffice-app audit --omit=dev --audit-level=high
          npm --prefix app/frontend/client-app audit --omit=dev --audit-level=high

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Run Python dependency audit
        run: |
          set +e
          python -m pip_audit -r app/backend/requirements.txt --format json -o pip-audit.json
          audit_status=$?
          set -e
          if [[ ! -f pip-audit.json ]]; then
            echo "pip-audit did not produce pip-audit.json"
            exit $audit_status
          fi
          node scripts/testing/check-pip-audit.mjs pip-audit.json scripts/testing/pip-audit-allowlist.json

      - name: Upload Python dependency audit
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: backend-pip-audit
          path: pip-audit.json
          if-no-files-found: ignore

  backend-pytest:
    name: Backend pytest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create .env for CI
        run: cp .env.example .env

      - name: Start Docker services
        run: docker compose up -d --build db redis backend

      - name: Django system check
        run: docker compose exec -T backend python manage.py check

      - name: Verify committed migrations
        run: docker compose exec -T backend python manage.py makemigrations --check --dry-run

      - name: Run backend pytest suite
        run: docker compose exec -T -e DJANGO_SETTINGS_MODULE=tastify_backend.settings.test -e DB_USER=root -e DB_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD || 'root_password' }} backend python -m pytest -q

      - name: Copy coverage report from container
        run: docker compose cp backend:/app/coverage.xml coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Dump backend logs on failure
        if: failure()
        run: docker compose logs backend db redis

      - name: Capture backend logs for artifact upload
        if: failure()
        run: docker compose logs backend db redis > backend-docker.log

      - name: Upload backend logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: backend-docker-logs
          path: backend-docker.log
          if-no-files-found: ignore

      - name: Stop Docker services
        if: always()
        run: docker compose down --volumes --remove-orphans

  client-e2e:
    name: Client Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    if: needs.changes.outputs.client == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/frontend/client-app/package-lock.json

      - name: Install client dependencies
        working-directory: app/frontend/client-app
        run: npm ci

      - name: Disable unavailable Microsoft apt repositories
        run: |
          mapfile -t microsoft_sources < <(sudo grep -rl "packages.microsoft.com" /etc/apt/sources.list.d 2>/dev/null || true)
          for source_file in "${microsoft_sources[@]}"; do
            sudo mv "$source_file" "$source_file.disabled"
          done

      - name: Install Playwright browser
        working-directory: app/frontend/client-app
        run: npx playwright install --with-deps chromium

      - name: Create .env for CI
        run: cp .env.example .env

      - name: Run client E2E stack
        env:
          CI: "true"
          CLIENT_BASE_URL: http://127.0.0.1:3003
        run: node scripts/testing/run-suite.mjs e2e:client

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: client-playwright-report
          path: app/frontend/client-app/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: client-playwright-test-results
          path: app/frontend/client-app/test-results
          if-no-files-found: ignore

  expanded-browser-smoke:
    name: Expanded browser and mobile smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            app/frontend/backoffice-app/package-lock.json
            app/frontend/client-app/package-lock.json

      - name: Install backoffice dependencies
        working-directory: app/frontend/backoffice-app
        run: npm ci

      - name: Install client dependencies
        working-directory: app/frontend/client-app
        run: npm ci

      - name: Disable unavailable Microsoft apt repositories
        run: |
          mapfile -t microsoft_sources < <(sudo grep -rl "packages.microsoft.com" /etc/apt/sources.list.d 2>/dev/null || true)
          for source_file in "${microsoft_sources[@]}"; do
            sudo mv "$source_file" "$source_file.disabled"
          done

      - name: Install expanded Playwright browsers
        run: |
          npm --prefix app/frontend/backoffice-app run test:e2e:install
          npm --prefix app/frontend/client-app run test:e2e:install

      - name: Create .env for CI
        run: cp .env.example .env

      - name: Run expanded browser and mobile smoke
        env:
          CI: "true"
          PLAYWRIGHT_EXPANDED_MATRIX: "true"
          BACKOFFICE_BASE_URL: http://127.0.0.1:3000
          CLIENT_BASE_URL: http://127.0.0.1:3003
        run: node scripts/testing/run-suite.mjs e2e:matrix

      - name: Upload matrix Playwright reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: expanded-browser-playwright-reports
          path: |
            app/frontend/backoffice-app/playwright-report
            app/frontend/client-app/playwright-report
          if-no-files-found: ignore

  backoffice-e2e:
    name: Backoffice Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    if: needs.changes.outputs.backoffice == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/frontend/backoffice-app/package-lock.json

      - name: Install backoffice dependencies
        working-directory: app/frontend/backoffice-app
        run: npm ci

      - name: Disable unavailable Microsoft apt repositories
        run: |
          mapfile -t microsoft_sources < <(sudo grep -rl "packages.microsoft.com" /etc/apt/sources.list.d 2>/dev/null || true)
          for source_file in "${microsoft_sources[@]}"; do
            sudo mv "$source_file" "$source_file.disabled"
          done

      - name: Install Playwright browser
        working-directory: app/frontend/backoffice-app
        run: npx playwright install --with-deps chromium

      - name: Create .env for CI
        run: cp .env.example .env

      - name: Run backoffice E2E stack
        env:
          CI: "true"
          BACKOFFICE_BASE_URL: http://127.0.0.1:3000
        run: node scripts/testing/run-suite.mjs e2e:backoffice

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: backoffice-playwright-report
          path: app/frontend/backoffice-app/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: backoffice-playwright-test-results
          path: app/frontend/backoffice-app/test-results
          if-no-files-found: ignore

  preview-smoke:
    name: Preview environment smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Create .env for CI
        run: cp .env.example .env

      - name: Run preview smoke stack
        env:
          CI: "true"
        run: node scripts/testing/run-suite.mjs preview:smoke

  load-tests:
    name: Load tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    continue-on-error: true
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.full_run == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Prepare load test artifact directory
        run: |
          rm -rf artifacts/load-tests
          mkdir -p artifacts/load-tests

      - name: Create .env for CI
        run: cp .env.example .env

      - name: Run load test stack
        env:
          CI: "true"
          LOCUST_USERS: "20"
          LOCUST_SPAWN_RATE: "4"
          LOCUST_RUN_TIME: "60s"
          LOAD_MAX_P95_MS: "1500"
          LOAD_MAX_AVG_MS: "800"
          LOAD_MAX_FAIL_RATIO: "0.02"
          LOAD_MIN_REQUESTS: "40"
        run: node scripts/testing/run-suite.mjs load

      - name: Upload load test artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: load-test-artifacts
          path: artifacts/load-tests
          if-no-files-found: ignore

  load-tests-nightly:
    name: Load tests nightly
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: changes
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Prepare load test artifact directory
        run: |
          rm -rf artifacts/load-tests
          mkdir -p artifacts/load-tests

      - name: Create .env for CI
        run: cp .env.example .env

      - name: Run nightly load test stack
        env:
          CI: "true"
          LOCUST_USERS: "30"
          LOCUST_SPAWN_RATE: "5"
          LOCUST_RUN_TIME: "180s"
          LOAD_MAX_P95_MS: "1800"
          LOAD_MAX_AVG_MS: "1000"
          LOAD_MAX_FAIL_RATIO: "0.02"
          LOAD_MIN_REQUESTS: "80"
        run: node scripts/testing/run-suite.mjs load

      - name: Upload nightly load test artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: nightly-load-test-artifacts
          path: artifacts/load-tests
          if-no-files-found: ignore

  cross-app-realism:
    name: Cross-app realism
    runs-on: ubuntu-latest
    timeout-minutes: 35
    continue-on-error: true
    needs: changes
    if: needs.changes.outputs.client == 'true' || needs.changes.outputs.backoffice == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.full_run == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            app/frontend/backoffice-app/package-lock.json
            app/frontend/client-app/package-lock.json

      - name: Install client dependencies
        working-directory: app/frontend/client-app
        run: npm ci

      - name: Disable unavailable Microsoft apt repositories
        run: |
          mapfile -t microsoft_sources < <(sudo grep -rl "packages.microsoft.com" /etc/apt/sources.list.d 2>/dev/null || true)
          for source_file in "${microsoft_sources[@]}"; do
            sudo mv "$source_file" "$source_file.disabled"
          done

      - name: Install Playwright browser
        working-directory: app/frontend/client-app
        run: npx playwright install --with-deps chromium

      - name: Create .env for CI
        run: cp .env.example .env

      - name: Run cross-app realism suite
        env:
          CI: "true"
          BACKOFFICE_BASE_URL: http://127.0.0.1:3000
          CLIENT_BASE_URL: http://127.0.0.1:3003
        run: node scripts/testing/run-suite.mjs e2e:cross-app

      - name: Upload cross-app realism report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cross-app-realism-report
          path: app/frontend/client-app/playwright-report
          if-no-files-found: ignore

      - name: Upload cross-app realism traces
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: cross-app-realism-test-results
          path: app/frontend/client-app/test-results
          if-no-files-found: ignore

  real-device-matrix:
    name: Device-lab-ready matrix preflight
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    needs: changes
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || needs.changes.outputs.full_run == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            app/frontend/backoffice-app/package-lock.json
            app/frontend/client-app/package-lock.json

      - name: Install backoffice dependencies
        working-directory: app/frontend/backoffice-app
        run: npm ci

      - name: Install client dependencies
        working-directory: app/frontend/client-app
        run: npm ci

      - name: Disable unavailable Microsoft apt repositories
        run: |
          mapfile -t microsoft_sources < <(sudo grep -rl "packages.microsoft.com" /etc/apt/sources.list.d 2>/dev/null || true)
          for source_file in "${microsoft_sources[@]}"; do
            sudo mv "$source_file" "$source_file.disabled"
          done

      - name: Install expanded Playwright browsers
        run: |
          npm --prefix app/frontend/backoffice-app run test:e2e:install
          npm --prefix app/frontend/client-app run test:e2e:install

      - name: Create .env for CI
        run: cp .env.example .env

      - name: Detect remote device credentials
        id: device_lab
        env:
          PLAYWRIGHT_REAL_DEVICE_PROVIDER: ${{ vars.PLAYWRIGHT_REAL_DEVICE_PROVIDER }}
          REAL_DEVICE_USERNAME: ${{ secrets.REAL_DEVICE_USERNAME }}
          REAL_DEVICE_ACCESS_KEY: ${{ secrets.REAL_DEVICE_ACCESS_KEY }}
        run: |
          if [[ -n "$PLAYWRIGHT_REAL_DEVICE_PROVIDER" && -n "$REAL_DEVICE_USERNAME" && -n "$REAL_DEVICE_ACCESS_KEY" ]]; then
            echo "provider=$PLAYWRIGHT_REAL_DEVICE_PROVIDER" >> "$GITHUB_OUTPUT"
          else
            echo "provider=preflight" >> "$GITHUB_OUTPUT"
          fi

      - name: Run device-lab-ready preflight
        env:
          CI: "true"
          PLAYWRIGHT_REAL_DEVICE_PROVIDER: ${{ steps.device_lab.outputs.provider }}
          REAL_DEVICE_USERNAME: ${{ secrets.REAL_DEVICE_USERNAME }}
          REAL_DEVICE_ACCESS_KEY: ${{ secrets.REAL_DEVICE_ACCESS_KEY }}
          REAL_DEVICE_PROJECT: ${{ vars.REAL_DEVICE_PROJECT }}
          REAL_DEVICE_BUILD: ${{ github.run_id }}
          PLAYWRIGHT_EXPANDED_MATRIX: "true"
          BACKOFFICE_BASE_URL: http://127.0.0.1:3000
          CLIENT_BASE_URL: http://127.0.0.1:3003
        run: node scripts/testing/run-suite.mjs e2e:real-devices

      - name: Upload device-lab preflight reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: device-lab-preflight-reports
          path: |
            app/frontend/backoffice-app/playwright-report
            app/frontend/client-app/playwright-report
          if-no-files-found: ignore
