name: QA CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: qa-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            app/frontend/backoffice-app/package-lock.json
            app/frontend/client-app/package-lock.json

      - name: Install backoffice dependencies
        working-directory: app/frontend/backoffice-app
        run: npm ci

      - name: Install client dependencies
        working-directory: app/frontend/client-app
        run: npm ci

      - name: Lint both frontends
        run: |
          npm --prefix app/frontend/backoffice-app run lint
          npm --prefix app/frontend/client-app run lint

      - name: Typecheck both frontends
        run: |
          npm --prefix app/frontend/backoffice-app run typecheck
          npm --prefix app/frontend/client-app run typecheck

      - name: Build both frontends
        run: |
          npm --prefix app/frontend/backoffice-app run build
          npm --prefix app/frontend/client-app run build

      - name: Run frontend unit tests
        run: |
          npm --prefix app/frontend/backoffice-app run test:unit
          npm --prefix app/frontend/client-app run test:unit

  backend-critical:
    name: Backend critical tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env for CI
        run: cp .env.example .env

      - name: Start Docker services
        run: docker compose up -d --build db redis backend

      - name: Django system check
        run: docker compose exec -T backend python manage.py check

      - name: Verify committed migrations
        run: docker compose exec -T backend python manage.py makemigrations --check --dry-run

      - name: Run critical backend tests
        run: docker compose exec -T backend python -m pytest apps/users/tests/test_auth.py apps/users/tests/test_register.py apps/configuration/tests/test_settings_api.py apps/paiements/tests/test_api.py

      - name: Dump backend logs on failure
        if: failure()
        run: docker compose logs backend

      - name: Stop Docker services
        if: always()
        run: docker compose down --volumes --remove-orphans

  client-e2e:
    name: Client Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - frontend-quality
      - backend-critical

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/frontend/client-app/package-lock.json

      - name: Install client dependencies
        working-directory: app/frontend/client-app
        run: npm ci

      - name: Install Playwright browser
        working-directory: app/frontend/client-app
        run: npx playwright install --with-deps chromium

      - name: Create .env for CI
        run: cp .env.example .env

      - name: Start Docker services for client E2E
        run: docker compose up -d --build db redis backend client-app

      - name: Verify backend before browser flows
        run: docker compose exec -T backend python manage.py check

      - name: Run Playwright suite
        working-directory: app/frontend/client-app
        env:
          CI: "true"
          CLIENT_BASE_URL: http://127.0.0.1:3003
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-playwright-report
          path: app/frontend/client-app/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: client-playwright-test-results
          path: app/frontend/client-app/test-results
          if-no-files-found: ignore

      - name: Dump Docker logs on failure
        if: failure()
        run: docker compose logs backend client-app db redis

      - name: Stop Docker services
        if: always()
        run: docker compose down --volumes --remove-orphans

  backoffice-e2e:
    name: Backoffice Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - frontend-quality
      - backend-critical

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/frontend/backoffice-app/package-lock.json

      - name: Install backoffice dependencies
        working-directory: app/frontend/backoffice-app
        run: npm ci

      - name: Install Playwright browser
        working-directory: app/frontend/backoffice-app
        run: npx playwright install --with-deps chromium

      - name: Create .env for CI
        run: cp .env.example .env

      - name: Start Docker services for E2E
        run: docker compose up -d --build db redis backend backoffice-app

      - name: Verify backend before browser flows
        run: docker compose exec -T backend python manage.py check

      - name: Run Playwright suite
        working-directory: app/frontend/backoffice-app
        env:
          CI: "true"
          BACKOFFICE_BASE_URL: http://127.0.0.1:3000
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/frontend/backoffice-app/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: app/frontend/backoffice-app/test-results
          if-no-files-found: ignore

      - name: Dump Docker logs on failure
        if: failure()
        run: docker compose logs backend backoffice-app db redis

      - name: Stop Docker services
        if: always()
        run: docker compose down --volumes --remove-orphans
