name: Publish GHCR Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths:
      - ".github/workflows/publish-ghcr.yml"
      - "app/backend/**"
      - "app/frontend/backoffice-app/**"
      - "app/frontend/client-app/**"
      - "docker-compose.unraid.yml"
      - "package*.json"
  pull_request:
    paths:
      - ".github/workflows/publish-ghcr.yml"
      - "app/backend/**"
      - "app/frontend/backoffice-app/**"
      - "app/frontend/client-app/**"
      - "docker-compose.unraid.yml"
      - "package*.json"
  workflow_dispatch:

concurrency:
  group: ghcr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash

jobs:
  docker:
    name: Build and publish ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            image: tastifypfa-backend
            context: app/backend
            dockerfile: app/backend/Dockerfile
            build_args: ""
          - service: backoffice
            image: tastifypfa-backoffice
            context: app/frontend/backoffice-app
            dockerfile: app/frontend/backoffice-app/Dockerfile.prod
            build_args: |
              VITE_API_BASE_URL=/api
              VITE_WS_BASE_URL=
              VITE_STAFF_WS_PATH=/ws/staff/
          - service: client
            image: tastifypfa-client
            context: app/frontend/client-app
            dockerfile: app/frontend/client-app/Dockerfile.prod
            build_args: |
              VITE_API_BASE_URL=/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Normalize image owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Tastify ${{ matrix.service }}
            org.opencontainers.image.description=TastifyPFA ${{ matrix.service }} container

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Extract first image tag for scanning
        id: image-ref
        run: echo "value=$(echo '${{ steps.meta.outputs.tags }}' | head -1)" >> "$GITHUB_OUTPUT"

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ steps.image-ref.outputs.value }}
          format: sarif
          output: trivy-results-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: ${{ github.event_name == 'push' && '1' || '0' }}

      - name: Upload Trivy results to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results-${{ matrix.service }}.sarif
          category: ${{ matrix.service }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          PREVIOUS_TAG=$(git tag --sort=-creatordate | head -2 | tail -1 || echo "")
          if [[ -z "$PREVIOUS_TAG" ]]; then
            NOTES="## What's Changed\n\nInitial release."
          else
            NOTES=$(git log "$PREVIOUS_TAG".."${{ github.ref_name }}" --pretty=format:"* %s (%h)" --no-merges | sort)
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.notes.outputs.notes }}
          generate_release_notes: true
          draft: false
          prerelease: false
