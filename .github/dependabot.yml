version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/app/frontend/backoffice-app"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "frontend"
    open-pull-requests-limit: 10
    groups:
      react:
        patterns:
          - "react*"
          - "@types/react*"
      tailwind:
        patterns:
          - "tailwindcss*"
          - "@tailwindcss/*"

  - package-ecosystem: "npm"
    directory: "/app/frontend/client-app"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "frontend"
    open-pull-requests-limit: 10
    groups:
      react:
        patterns:
          - "react*"
          - "@types/react*"
      tailwind:
        patterns:
          - "tailwindcss*"
          - "@tailwindcss/*"

  - package-ecosystem: "pip"
    directory: "/app/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "backend"
    open-pull-requests-limit: 10

  - package-ecosystem: "docker"
    directory: "/app/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/app/frontend/backoffice-app"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/app/frontend/client-app"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
