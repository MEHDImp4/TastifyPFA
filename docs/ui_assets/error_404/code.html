<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-client { stroke-width: 2.5px; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation Placeholder for completeness on Web -->
<header class="hidden md:flex justify-between items-center h-16 px-staff-margin w-full z-50 bg-surface dark:bg-surface border-b border-outline-variant dark:border-outline-variant">
<div class="font-display-lg text-headline-md tracking-tighter text-amber dark:text-amber">Tastify</div>
</header>
<!-- Main Content Canvas - 404 Experience -->
<!-- Suppressing shell navigation on mobile per instructions for dead-end/404 pages to prioritize canvas, but prompt explicitly asks for bottom nav, so I will include it as requested by prompt. Conflict resolution: Prompt explicitly states "Include the standard bottom navigation", which slightly overrides the general rule for 404 suppression if explicitly requested by user prompt. -->
<main class="flex-grow flex flex-col items-center justify-center px-client-margin py-unit-lg pb-32 md:pb-16 relative">
<!-- Abstract background pattern element for 'After-Hours' aesthetic -->
<div class="absolute inset-0 opacity-5 pointer-events-none" style="background-image: radial-gradient(circle at center, var(--surface-variant) 2px, transparent 2px); background-size: 32px 32px;"></div>
<div class="relative w-full max-w-2xl text-center z-10 flex flex-col items-center gap-unit-md">
<!-- The 404 Headline -->
<h1 class="font-display-lg text-display-lg-mobile md:text-display-lg text-primary-container">404</h1>
<!-- Structural Divider -->
<div class="w-16 h-px bg-outline-variant my-unit-sm"></div>
<!-- Poetic Message -->
<h2 class="font-headline-md text-headline-md text-on-surface">Une Table Introuvable</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md mx-auto mt-unit-sm">
                Le goût de l'évasion, littéralement. The page you are looking for has been cleared from our menu or never existed.
            </p>
<!-- Call to Action Actions -->
<div class="flex flex-col sm:flex-row gap-unit-md mt-unit-lg w-full sm:w-auto">
<!-- Return Home Button -->
<a class="inline-flex items-center justify-center px-unit-lg py-unit-md bg-secondary text-ink font-ui-button text-ui-button rounded-full hover:bg-primary-container active:scale-95 transition-all duration-300" href="#">
<span class="material-symbols-outlined mr-unit-sm icon-client" data-icon="home">home</span>
                    Return Home
                </a>
<!-- View Menu Outline Button -->
<a class="inline-flex items-center justify-center px-unit-lg py-unit-md border border-aged-paper text-on-surface font-ui-button text-ui-button rounded-full hover:bg-surface-container-high active:scale-95 transition-all duration-300" href="#">
<span class="material-symbols-outlined mr-unit-sm icon-client" data-icon="menu_book">menu_book</span>
                    View Menu
                </a>
</div>
</div>
</main>
<!-- BottomNavBar (Mobile Only) - Included as per explicit user prompt, despite general 404 suppression rule -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-client-margin pb-safe bg-surface dark:bg-surface border-t border-outline-variant rounded-t-xl">
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-opacity active:scale-90 transition-all duration-300 w-16" href="#">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="font-ui-label-bold text-[10px]">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-opacity active:scale-90 transition-all duration-300 w-16" href="#">
<span class="material-symbols-outlined mb-1" data-icon="menu_book">menu_book</span>
<span class="font-ui-label-bold text-[10px]">Menu</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-opacity active:scale-90 transition-all duration-300 w-16" href="#">
<span class="material-symbols-outlined mb-1" data-icon="chair_alt">chair_alt</span>
<span class="font-ui-label-bold text-[10px]">My Table</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-opacity active:scale-90 transition-all duration-300 w-16" href="#">
<span class="material-symbols-outlined mb-1" data-icon="receipt_long">receipt_long</span>
<span class="font-ui-label-bold text-[10px]">Bill</span>
</a>
</nav>
<script>
        // Simple subtle entrance animation for the main content
        document.addEventListener('DOMContentLoaded', () => {
            const mainContent = document.querySelector('main > div');
            mainContent.style.opacity = '0';
            mainContent.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                mainContent.style.transition = 'opacity 0.8s ease-out, transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)';
                mainContent.style.opacity = '1';
                mainContent.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body></html>
