<script>
        // Lightweight interaction for the form inputs to simulate focus states structurally
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', (e) => {
                e.target.parentElement.previousElementSibling.classList.replace('text-on-surface-variant', 'text-amber');
            });
            input.addEventListener('blur', (e) => {
                e.target.parentElement.previousElementSibling.classList.replace('text-amber', 'text-on-surface-variant');
            });
        });
    </script>
