<body class="bg-background text-on-background min-h-screen antialiased selection:bg-amber selection:text-ink">
<main class="flex min-h-screen w-full">
<section class="hidden lg:block lg:w-1/2 relative border-r border-outline-variant bg-surface-main overflow-hidden">
<div class="absolute inset-0 bg-cover bg-center" data-alt="A highly cinematic, moody photograph of an exclusive, dimly lit Michelin-star restaurant dining room after hours. The scene features deep charcoal tones and stark black shadows, punctuated by focused, warm gallery-style spotlighting hitting pristine glassware. The aesthetic is modern minimalist with hard architectural lines, conveying organic sophistication and tactical precision. No blurred elements, everything is sharply in focus and completely opaque." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAljV4FMa2ZqoMBY2ADNGxeTDO-z0nnzYmUwVKoBROwHHKuJgr588oE4Q53G89bi0nBCfRKu8Bf7M6MkGLtQJ6AZsI2F0vQidfxIe1MNposVtOUbNtUvgYubHRrF3cO3zNXGpBLBm5T-N8BDwsnlaAnohO82oWma0WqucygPl6-K4HmO7KQFmv8cRh2pfkhKu290UFABH_NiIQcpn15doBQp_rWE5fLIwB_52lWEDR5YoLeeTz2cPYN1BjgLjVDH9dYhagFtnJuig');">
</div>
<div class="absolute inset-0 bg-background/40"></div>
<div class="absolute bottom-unit-lg left-client-margin z-10">
<span class="material-symbols-outlined text-primary text-[48px] mb-unit-sm" style="font-variation-settings: 'wght' 200, 'FILL' 0;">restaurant_menu</span>
<p class="font-body-lg text-body-lg text-primary max-w-md">Commanding precision. Organic sophistication. Enter the ledger.</p>
</div>
</section>
<section class="w-full lg:w-1/2 flex flex-col justify-center px-client-margin py-unit-lg relative bg-background">
<div class="absolute top-unit-lg left-client-margin lg:left-client-gutter">
<a class="inline-flex items-center gap-unit-xs text-on-surface-variant hover:text-primary transition-colors duration-300" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 300;">arrow_back</span>
<span class="font-ui-button text-ui-button uppercase">Return</span>
</a>
</div>
<div class="w-full max-w-[480px] mx-auto mt-12 lg:mt-0">
<header class="mb-10">
<h1 class="font-display-lg text-display-lg-mobile md:text-display-lg tracking-tighter text-primary mb-2">L'ESSENCE</h1>
<h2 class="font-headline-md text-headline-md text-on-background">Client Registration</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-unit-xs">Establish your profile within the private ledger.</p>
</header>
<form class="flex flex-col gap-unit-md" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-unit-xs">
<label class="font-ui-label-bold text-ui-label-bold text-on-surface-variant uppercase" for="fullName">Full Name</label>
<input class="w-full bg-surface-main border border-outline-variant rounded-DEFAULT px-unit-md py-[14px] font-body-md text-body-md text-on-surface focus:border-amber focus:ring-1 focus:ring-amber focus:outline-none transition-colors duration-300 placeholder:text-outline-variant" id="fullName" placeholder="e.g. Valjean" required="" type="text">
</div>
<div class="flex flex-col gap-unit-xs">
<label class="font-ui-label-bold text-ui-label-bold text-on-surface-variant uppercase" for="email">Email Address</label>
<input class="w-full bg-surface-main border border-outline-variant rounded-DEFAULT px-unit-md py-[14px] font-body-md text-body-md text-on-surface focus:border-amber focus:ring-1 focus:ring-amber focus:outline-none transition-colors duration-300 placeholder:text-outline-variant" id="email" placeholder="client@domain.com" required="" type="email">
</div>
<div class="flex flex-col gap-unit-xs">
<label class="font-ui-label-bold text-ui-label-bold text-on-surface-variant uppercase" for="phone">Phone Number</label>
<input class="w-full bg-surface-main border border-outline-variant rounded-DEFAULT px-unit-md py-[14px] font-body-md text-body-md text-on-surface focus:border-amber focus:ring-1 focus:ring-amber focus:outline-none transition-colors duration-300 placeholder:text-outline-variant" id="phone" placeholder="+1 (555) 000-0000" required="" type="tel">
</div>
<div class="flex flex-col gap-unit-xs">
<label class="font-ui-label-bold text-ui-label-bold text-on-surface-variant uppercase" for="password">Secure Password</label>
<div class="relative">
<input class="w-full bg-surface-main border border-outline-variant rounded-DEFAULT pl-unit-md pr-12 py-[14px] font-body-md text-body-md text-on-surface focus:border-amber focus:ring-1 focus:ring-amber focus:outline-none transition-colors duration-300 placeholder:text-outline-variant" id="password" placeholder="••••••••" required="" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" onclick="const p = document.getElementById('password'); p.type = p.type === 'password' ? 'text' : 'password';" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 300;">visibility</span>
</button>
</div>
</div>
<div class="mt-unit-sm">
<button class="w-full bg-primary hover:bg-tertiary text-on-primary font-ui-button text-ui-button py-4 rounded-DEFAULT transition-all duration-300 active:scale-[0.98] border border-transparent hover:border-aged-paper uppercase flex items-center justify-center gap-2" type="submit">
                            Initialize Profile
                            <span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'wght' 700;">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-8 pt-6 border-t border-outline-variant text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                        Already hold credentials? 
                        <a class="text-primary hover:text-amber font-ui-label-bold text-ui-label-bold uppercase tracking-widest ml-2 border-b border-primary hover:border-amber transition-colors pb-0.5" href="#">Sign In</a>
</p>
</div>
</div>
</section>
</main>
