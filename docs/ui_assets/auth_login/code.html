<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        input:focus {
            outline: none;
            border-color: var(--color-amber) !important;
            box-shadow: none !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background min-h-screen flex flex-col md:flex-row antialiased">
<!-- Left/Top Image Area -->
<div class="relative w-full md:w-1/2 h-[353px] md:h-screen hidden md:block">
<div class="absolute inset-0 bg-cover bg-center" data-alt="A macro, editorial shot of a finely plated Michelin-star dish resting on a textured slate surface. The lighting is moody and focused, highlighting the intricate details and vibrant colors of the micro-greens and sauces. The background is engulfed in deep, velvety darkness, creating an atmosphere of exclusivity and culinary perfection. The overall aesthetic perfectly matches a premium, high-contrast dark mode UI style." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC1X5px5O6rOvCXmfb_K0zXCZ0CS8kUM73kAG74RrAPtH85zEd2rV0YOPoS68_hsWQX4xFsO26O1x8F64tT1vHzx_9JqnJlm3dfK4w4jvTaH_6OuvaoWhnNZtNfTXVTLUaBZazmx5HgcISfCaXQID0wopQzEiJFVlCkEKoAOLjabB0jFBNPlbI-2aMeSs5AcfV9Li6OdKP5QPIxCLcrL1Eya1W-Y0ksBplNO2Sra6l-n3Ip2djNdFAzKiP2Lut8mS6HQJBrcu-liQ')">
</div>
<div class="absolute inset-0 bg-gradient-to-t from-background via-background/50 to-transparent md:bg-gradient-to-r md:from-transparent md:via-background/50 md:to-background"></div>
<div class="absolute top-client-margin left-client-margin">
<h1 class="font-headline-md text-headline-md tracking-tighter text-primary">L'ESSENCE</h1>
</div>
</div>
<!-- Right/Bottom Content Area (Login Form) -->
<div class="w-full md:w-1/2 flex flex-col justify-center px-client-margin py-unit-lg md:py-0 min-h-screen md:min-h-0 relative z-10 bg-background">
<!-- Mobile Header -->
<div class="md:hidden mb-unit-lg text-center">
<h1 class="font-display-lg-mobile text-display-lg-mobile tracking-tighter text-primary">L'ESSENCE</h1>
</div>
<div class="max-w-md w-full mx-auto space-y-unit-lg">
<div class="space-y-unit-sm text-center md:text-left">
<h2 class="font-headline-md text-headline-md text-on-background">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Please authenticate to access your reservations and bespoke menus.</p>
</div>
<form class="space-y-unit-md mt-unit-lg">
<div class="space-y-unit-sm">
<label class="block font-ui-label-bold text-ui-label-bold text-on-surface-variant uppercase tracking-widest" for="email">Email Address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">mail</span>
</span>
<input class="w-full bg-surface-container border border-outline-variant rounded-none py-3 pl-10 pr-4 text-on-background font-body-md text-body-md placeholder-on-surface-variant/50 transition-colors duration-300" id="email" name="email" placeholder="client@example.com" required="" type="email">
</div>
</div>
<div class="space-y-unit-sm">
<div class="flex justify-between items-center">
<label class="block font-ui-label-bold text-ui-label-bold text-on-surface-variant uppercase tracking-widest" for="password">Password</label>
<a class="font-ui-button text-ui-button text-secondary hover:text-primary transition-colors duration-200" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">lock</span>
</span>
<input class="w-full bg-surface-container border border-outline-variant rounded-none py-3 pl-10 pr-4 text-on-background font-body-md text-body-md placeholder-on-surface-variant/50 transition-colors duration-300" id="password" name="password" placeholder="••••••••" required="" type="password">
</div>
</div>
<div class="pt-unit-sm">
<button class="w-full bg-primary text-ink font-ui-button text-ui-button py-4 px-6 uppercase tracking-widest hover:bg-secondary transition-all duration-300 transform active:scale-[0.98] border border-transparent" type="submit">
                        Sign In
                    </button>
</div>
</form>
<div class="text-center pt-unit-md">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary font-ui-button text-ui-button uppercase hover:text-secondary transition-colors duration-200 ml-2" href="#">Sign up</a>
</p>
</div>
</div>
</div>
</body></html>
