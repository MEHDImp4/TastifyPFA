<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Tastify OS - Order Entry</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@600;700&amp;family=Inclusive+Sans&amp;family=Rethink+Sans:wght@600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#120d0a",
                        "tertiary-fixed": "#ffdcc6",
                        "error": "#ffb4ab",
                        "on-tertiary-fixed-variant": "#643e22",
                        "inverse-on-surface": "#362f2b",
                        "on-background": "#ece0da",
                        "primary-fixed": "#ffdcc6",
                        "on-secondary-container": "#efa978",
                        "on-error-container": "#ffdad6",
                        "outline-variant": "#52443b",
                        "outline": "#9f8d83",
                        "error-container": "#93000a",
                        "surface-main": "#151312",
                        "inverse-surface": "#ece0da",
                        "surface-container": "#241e1b",
                        "primary-fixed-dim": "#ffb785",
                        "surface-tint": "#ffb785",
                        "surface-container-highest": "#3a332f",
                        "secondary-fixed-dim": "#ffb785",
                        "background": "#18120f",
                        "on-surface-variant": "#d7c3b7",
                        "secondary-container": "#6e3d15",
                        "on-secondary": "#502500",
                        "on-primary-fixed-variant": "#6b3a13",
                        "tertiary-fixed-dim": "#f2bb96",
                        "tertiary": "#ffdbc5",
                        "on-tertiary": "#49280e",
                        "tertiary-container": "#f2bb96",
                        "surface-dim": "#18120f",
                        "secondary": "#ffb785",
                        "surface-container-high": "#2f2925",
                        "surface-container-low": "#201a17",
                        "on-primary-container": "#79461d",
                        "amber": "#8f4d17",
                        "on-tertiary-container": "#71492c",
                        "surface-variant": "#3a332f",
                        "on-secondary-fixed": "#301400",
                        "surface": "#18120f",
                        "surface-bright": "#3f3834",
                        "on-error": "#690005",
                        "primary": "#ffdcc6",
                        "ink": "#100e0c",
                        "on-tertiary-fixed": "#301400",
                        "charcoal-bright": "#3c3937",
                        "on-secondary-fixed-variant": "#6b3a13",
                        "inverse-primary": "#875128",
                        "on-surface": "#ece0da",
                        "on-primary": "#502500",
                        "secondary-fixed": "#ffdcc6",
                        "primary-container": "#ffb785",
                        "aged-paper": "#fff8f5",
                        "on-primary-fixed": "#301400"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit-sm": "8px",
                        "unit-xs": "4px",
                        "staff-gutter": "1rem",
                        "staff-margin": "1.5rem",
                        "unit-md": "16px",
                        "client-gutter": "3rem",
                        "unit-lg": "24px",
                        "client-margin": "5vw"
                    },
                    "fontFamily": {
                        "ui-label-bold": ["Rethink Sans"],
                        "ui-button": ["Rethink Sans"],
                        "display-lg": ["Public Sans"],
                        "headline-md": ["Public Sans"],
                        "body-md": ["Inclusive Sans"],
                        "body-lg": ["Inclusive Sans"],
                        "ui-data-dense": ["Rethink Sans"],
                        "display-lg-mobile": ["Public Sans"]
                    },
                    "fontSize": {
                        "ui-label-bold": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.25em", "fontWeight": "800" }],
                        "ui-button": ["14px", { "lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "display-lg": ["64px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["32px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "ui-data-dense": ["13px", { "lineHeight": "1.0", "fontWeight": "600" }],
                        "display-lg-mobile": ["40px", { "lineHeight": "1.2", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body class="bg-background text-on-surface h-screen w-screen overflow-hidden flex font-body-md">
<!-- SideNavBar (Suppressed intentionally as per rules for transactional/task-focused flows like Order Entry. Using simplified side panel for menu instead) -->
<main class="flex-1 flex flex-col h-full w-full bg-surface-main">
<!-- TopAppBar Contextual Replacement -->
<header class="sticky top-0 z-40 w-full border-b border-outline-variant bg-surface-main flex items-center justify-between px-staff-gutter py-unit-sm">
<div class="flex items-center gap-4">
<button class="p-2 rounded-lg hover:bg-surface-container-high transition-all outline-none focus:ring-2 focus:ring-amber">
<span class="material-symbols-outlined text-on-surface-variant">arrow_back</span>
</button>
<div class="font-headline-md text-headline-md font-black text-on-surface tracking-widest">
                    Table 42
                </div>
<span class="bg-surface-container-high px-2 py-1 rounded text-ui-data-dense font-ui-data-dense text-on-surface-variant ml-2 border border-outline-variant">Party of 4</span>
</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-lg hover:bg-surface-container-high transition-all outline-none focus:ring-2 focus:ring-amber">
<span class="material-symbols-outlined text-on-surface-variant">search</span>
</button>
</div>
</header>
<div class="flex-1 flex overflow-hidden">
<!-- Left Panel: Menu -->
<section class="w-2/3 h-full border-r border-outline-variant bg-surface-container-lowest flex flex-col">
<!-- Categories -->
<div class="flex overflow-x-auto border-b border-outline-variant bg-surface-container py-2 px-staff-gutter gap-2 no-scrollbar">
<button class="px-4 py-2 rounded-lg bg-secondary-container text-on-secondary-container font-ui-label-bold text-ui-label-bold whitespace-nowrap">Starters</button>
<button class="px-4 py-2 rounded-lg text-on-surface-variant hover:bg-surface-variant transition-colors font-ui-label-bold text-ui-label-bold whitespace-nowrap">Mains</button>
<button class="px-4 py-2 rounded-lg text-on-surface-variant hover:bg-surface-variant transition-colors font-ui-label-bold text-ui-label-bold whitespace-nowrap">Sides</button>
<button class="px-4 py-2 rounded-lg text-on-surface-variant hover:bg-surface-variant transition-colors font-ui-label-bold text-ui-label-bold whitespace-nowrap">Desserts</button>
<button class="px-4 py-2 rounded-lg text-on-surface-variant hover:bg-surface-variant transition-colors font-ui-label-bold text-ui-label-bold whitespace-nowrap">Beverages</button>
<button class="px-4 py-2 rounded-lg text-on-surface-variant hover:bg-surface-variant transition-colors font-ui-label-bold text-ui-label-bold whitespace-nowrap">Spirits</button>
</div>
<!-- Menu Grid -->
<div class="flex-1 overflow-y-auto p-staff-margin grid grid-cols-3 gap-unit-md auto-rows-max">
<!-- Item -->
<button class="bg-surface-container hover:bg-surface-container-high border border-outline-variant rounded-lg p-unit-md text-left flex flex-col justify-between h-32 transition-all hover:border-outline focus:outline-none focus:ring-2 focus:ring-amber">
<span class="font-body-md text-on-surface">Wagyu Tartare</span>
<span class="font-ui-data-dense text-ui-data-dense text-primary">$28</span>
</button>
<button class="bg-surface-container hover:bg-surface-container-high border border-outline-variant rounded-lg p-unit-md text-left flex flex-col justify-between h-32 transition-all hover:border-outline focus:outline-none focus:ring-2 focus:ring-amber">
<span class="font-body-md text-on-surface">Oyster Platter (½ Doz)</span>
<span class="font-ui-data-dense text-ui-data-dense text-primary">$36</span>
</button>
<button class="bg-surface-container hover:bg-surface-container-high border border-outline-variant rounded-lg p-unit-md text-left flex flex-col justify-between h-32 transition-all hover:border-outline focus:outline-none focus:ring-2 focus:ring-amber">
<span class="font-body-md text-on-surface">Burrata &amp; Heirloom</span>
<span class="font-ui-data-dense text-ui-data-dense text-primary">$22</span>
</button>
<button class="bg-surface-container hover:bg-surface-container-high border border-outline-variant rounded-lg p-unit-md text-left flex flex-col justify-between h-32 transition-all hover:border-outline focus:outline-none focus:ring-2 focus:ring-amber">
<span class="font-body-md text-on-surface">Bone Marrow</span>
<span class="font-ui-data-dense text-ui-data-dense text-primary">$26</span>
</button>
<button class="bg-surface-container hover:bg-surface-container-high border border-outline-variant rounded-lg p-unit-md text-left flex flex-col justify-between h-32 transition-all hover:border-outline focus:outline-none focus:ring-2 focus:ring-amber opacity-50 cursor-not-allowed">
<div class="flex justify-between items-start w-full">
<span class="font-body-md text-on-surface-variant">Truffle Arancini</span>
<span class="text-xs bg-error-container text-on-error-container px-1 py-0.5 rounded font-ui-data-dense">86</span>
</div>
<span class="font-ui-data-dense text-ui-data-dense text-on-surface-variant">$18</span>
</button>
<button class="bg-surface-container hover:bg-surface-container-high border border-outline-variant rounded-lg p-unit-md text-left flex flex-col justify-between h-32 transition-all hover:border-outline focus:outline-none focus:ring-2 focus:ring-amber">
<span class="font-body-md text-on-surface">Hamachi Crudo</span>
<span class="font-ui-data-dense text-ui-data-dense text-primary">$24</span>
</button>
</div>
</section>
<!-- Right Panel: Ticket -->
<section class="w-1/3 h-full bg-surface-container-lowest flex flex-col">
<!-- Ticket Header -->
<div class="px-staff-gutter py-unit-sm border-b border-outline-variant flex justify-between items-center bg-surface-container-low">
<span class="font-ui-label-bold text-ui-label-bold text-on-surface-variant uppercase tracking-widest">Active Ticket</span>
<label class="flex items-center cursor-pointer gap-2">
<span class="font-ui-data-dense text-ui-data-dense text-error">FIRE NOW</span>
<div class="relative">
<input class="sr-only" type="checkbox">
<div class="block bg-surface-container-highest w-10 h-6 rounded-full border border-outline-variant"></div>
<div class="dot absolute left-1 top-1 bg-on-surface w-4 h-4 rounded-full transition"></div>
</div>
</label>
</div>
<!-- Ticket Items -->
<div class="flex-1 overflow-y-auto bg-surface-container-lowest">
<!-- Item 1 -->
<div class="p-unit-sm border-b border-outline-variant hover:bg-surface-container transition-colors group">
<div class="flex justify-between items-start">
<div class="flex gap-2">
<span class="font-ui-data-dense text-ui-data-dense text-primary w-4 text-right">1x</span>
<span class="font-body-md text-on-surface">Wagyu Tartare</span>
</div>
<span class="font-ui-data-dense text-ui-data-dense text-on-surface">$28.00</span>
</div>
<div class="ml-6 mt-1 flex flex-col gap-1">
<span class="font-ui-data-dense text-ui-data-dense text-on-surface-variant">- No quail egg</span>
<span class="font-ui-data-dense text-ui-data-dense text-amber">+ GF Crostini</span>
</div>
<div class="ml-6 mt-2 opacity-0 group-hover:opacity-100 transition-opacity flex gap-2">
<button class="bg-surface-variant p-1 rounded hover:bg-surface-bright text-on-surface"><span class="material-symbols-outlined text-[16px]">edit</span></button>
<button class="bg-surface-variant p-1 rounded hover:bg-error text-on-error"><span class="material-symbols-outlined text-[16px]">delete</span></button>
</div>
</div>
<!-- Item 2 -->
<div class="p-unit-sm border-b border-outline-variant hover:bg-surface-container transition-colors group">
<div class="flex justify-between items-start">
<div class="flex gap-2">
<span class="font-ui-data-dense text-ui-data-dense text-primary w-4 text-right">2x</span>
<span class="font-body-md text-on-surface">Oyster Platter (½ Doz)</span>
</div>
<span class="font-ui-data-dense text-ui-data-dense text-on-surface">$72.00</span>
</div>
<div class="ml-6 mt-2 opacity-0 group-hover:opacity-100 transition-opacity flex gap-2">
<button class="bg-surface-variant p-1 rounded hover:bg-surface-bright text-on-surface"><span class="material-symbols-outlined text-[16px]">edit</span></button>
<button class="bg-surface-variant p-1 rounded hover:bg-error text-on-error"><span class="material-symbols-outlined text-[16px]">delete</span></button>
</div>
</div>
</div>
<!-- Ticket Footer -->
<div class="border-t border-outline-variant bg-surface-container-low p-staff-gutter flex flex-col gap-unit-md">
<div class="flex justify-between items-center font-ui-data-dense text-ui-data-dense text-on-surface-variant">
<span>Subtotal</span>
<span>$100.00</span>
</div>
<div class="flex justify-between items-center font-ui-data-dense text-ui-data-dense text-on-surface-variant">
<span>Tax (8.5%)</span>
<span>$8.50</span>
</div>
<div class="flex justify-between items-center font-headline-md text-headline-md text-primary pt-2 border-t border-outline">
<span>Total</span>
<span>$108.50</span>
</div>
<button class="w-full bg-primary-container text-on-primary-container font-ui-button text-ui-button py-3 rounded-lg hover:bg-primary transition-colors flex items-center justify-center gap-2 mt-2">
<span class="material-symbols-outlined">send</span> Send to Kitchen
                    </button>
</div>
</section>
</div>
</main>
</body></html>
