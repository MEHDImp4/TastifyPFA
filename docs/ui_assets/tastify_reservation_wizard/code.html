<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tastify - Reservation Wizard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&amp;family=Instrument+Serif:ital@0;1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-on-surface": "#f3f0ef",
                        "surface-container": "#f0eded",
                        "tertiary": "#525559",
                        "background": "#fcf9f8",
                        "on-tertiary-fixed-variant": "#44474b",
                        "surface-dim": "#dcd9d9",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#313030",
                        "surface-container-low": "#f6f3f2",
                        "surface-tint": "#124af0",
                        "on-primary-fixed": "#001356",
                        "outline-variant": "#c4c5d9",
                        "on-background": "#1c1b1b",
                        "surface-variant": "#e5e2e1",
                        "tertiary-container": "#6a6d71",
                        "on-surface-variant": "#434656",
                        "on-secondary-container": "#606161",
                        "outline": "#747688",
                        "primary-fixed-dim": "#b8c3ff",
                        "on-error": "#ffffff",
                        "primary": "#0040e0",
                        "inverse-primary": "#b8c3ff",
                        "secondary": "#5d5f5f",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#eef0f5",
                        "on-tertiary-fixed": "#181c20",
                        "primary-fixed": "#dde1ff",
                        "surface-bright": "#fcf9f8",
                        "on-primary-fixed-variant": "#0035be",
                        "secondary-fixed-dim": "#c6c6c6",
                        "on-secondary": "#ffffff",
                        "primary-container": "#2e5bff",
                        "tertiary-fixed": "#e0e2e7",
                        "on-secondary-fixed": "#1a1c1c",
                        "tertiary-fixed-dim": "#c4c6cb",
                        "secondary-container": "#dddddd",
                        "on-surface": "#1c1b1b",
                        "surface-container-highest": "#e5e2e1",
                        "surface": "#fcf9f8",
                        "error": "#ba1a1a",
                        "secondary-fixed": "#e2e2e2",
                        "on-secondary-fixed-variant": "#454747",
                        "on-primary-container": "#efefff",
                        "surface-container-high": "#eae7e7",
                        "surface-container-lowest": "#ffffff",
                        "on-error-container": "#93000a",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "container-max": "1440px",
                        "margin-desktop": "64px",
                        "margin-mobile": "20px",
                        "unit": "4px",
                        "128": "32rem"
                    },
                    "fontFamily": {
                        "headline-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "display-accent": ["Instrument Serif"],
                        "label-sm": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "display-accent": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .double-bezel {
                @apply bg-surface-container-lowest border-[0.5px] border-outline-variant shadow-[0px_4px_12px_rgba(0,0,0,0.02)] rounded-2xl relative overflow-hidden;
            }
            .double-bezel::before {
                content: '';
                @apply absolute inset-0 border border-surface-container-low rounded-2xl pointer-events-none;
            }
            .glass-panel {
                @apply bg-surface/60 backdrop-blur-[20px] border border-outline-variant/30 shadow-[0px_20px_40px_rgba(0,0,0,0.04)];
            }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased">
<!-- Note: TopAppBar and Navigation Shells are suppressed per rules: 
         "Automatic Suppression: You MUST exclude the navigation shell if the page intent is: Linear/Transactional... Checkout, or Success/Confirmation splash screens."
         This is a multi-step booking wizard, representing a focused transactional journey. -->
<main class="flex-grow flex flex-col items-center py-12 px-gutter w-full max-w-container-max mx-auto">
<!-- Wizard Header / Progress -->
<header class="w-full max-w-2xl mb-12 flex flex-col items-center">
<h1 class="font-display-accent text-display-accent text-on-surface mb-8">Reserve a Table</h1>
<div class="w-full flex items-center justify-between relative">
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-[1px] bg-outline-variant/50 -z-10"></div>
<!-- Step 1: Completed -->
<div class="flex flex-col items-center gap-2 bg-background px-2">
<div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-label-sm text-label-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="font-label-sm text-label-sm text-primary">Guests</span>
</div>
<!-- Step 2: Active -->
<div class="flex flex-col items-center gap-2 bg-background px-2">
<div class="w-8 h-8 rounded-full border-2 border-primary bg-surface-container-lowest text-primary flex items-center justify-center font-label-sm text-label-sm">
                        2
                    </div>
<span class="font-label-sm text-label-sm text-on-surface font-semibold">Date &amp; Time</span>
</div>
<!-- Step 3: Pending -->
<div class="flex flex-col items-center gap-2 bg-background px-2">
<div class="w-8 h-8 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant flex items-center justify-center font-label-sm text-label-sm">
                        3
                    </div>
<span class="font-label-sm text-label-sm text-on-surface-variant">Confirm</span>
</div>
</div>
</header>
<!-- Canvas Area -->
<div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-12 gap-8">
<!-- Left Column: The Dial Calendar & Selection -->
<div class="md:col-span-7 flex flex-col gap-6">
<!-- Dial Date Picker Concept -->
<div class="double-bezel p-8 flex flex-col items-center justify-center">
<h2 class="font-headline-md text-headline-md text-on-surface mb-6 w-full text-left">Select Date</h2>
<div class="relative w-full overflow-hidden h-32 flex items-center justify-center mask-image: linear-gradient(to right, transparent, black 20%, black 80%, transparent)">
<div class="flex items-center gap-4 transition-transform duration-300">
<!-- Previous Days (Dimmed) -->
<div class="flex flex-col items-center p-4 opacity-40 scale-90 cursor-pointer hover:opacity-70 transition-all">
<span class="font-label-sm text-label-sm text-on-surface-variant mb-1">TUE</span>
<span class="font-headline-lg text-headline-lg text-on-surface">12</span>
</div>
<div class="flex flex-col items-center p-4 opacity-60 scale-95 cursor-pointer hover:opacity-80 transition-all">
<span class="font-label-sm text-label-sm text-on-surface-variant mb-1">WED</span>
<span class="font-headline-lg text-headline-lg text-on-surface">13</span>
</div>
<!-- Active Day -->
<div class="flex flex-col items-center p-4 bg-primary text-on-primary rounded-xl scale-110 shadow-[0px_10px_20px_rgba(0,64,224,0.2)] border border-primary-fixed">
<span class="font-label-sm text-label-sm mb-1 text-primary-fixed">THU</span>
<span class="font-headline-lg text-headline-lg">14</span>
</div>
<!-- Next Days -->
<div class="flex flex-col items-center p-4 opacity-60 scale-95 cursor-pointer hover:opacity-80 transition-all">
<span class="font-label-sm text-label-sm text-on-surface-variant mb-1">FRI</span>
<span class="font-headline-lg text-headline-lg text-on-surface">15</span>
</div>
<div class="flex flex-col items-center p-4 opacity-40 scale-90 cursor-pointer hover:opacity-70 transition-all">
<span class="font-label-sm text-label-sm text-on-surface-variant mb-1">SAT</span>
<span class="font-headline-lg text-headline-lg text-on-surface">16</span>
</div>
</div>
</div>
</div>
<!-- Time Selection -->
<div class="double-bezel p-8">
<h2 class="font-headline-md text-headline-md text-on-surface mb-6">Select Time</h2>
<div class="grid grid-cols-3 sm:grid-cols-4 gap-4">
<button class="py-3 px-4 rounded-xl border-[0.5px] border-outline-variant text-on-surface-variant hover:bg-surface-container-low transition-colors font-body-md text-body-md">6:00 PM</button>
<button class="py-3 px-4 rounded-xl border-[0.5px] border-outline-variant text-on-surface-variant hover:bg-surface-container-low transition-colors font-body-md text-body-md">6:30 PM</button>
<button class="py-3 px-4 rounded-xl bg-primary text-on-primary font-semibold shadow-[0px_4px_12px_rgba(0,64,224,0.15)] font-body-md text-body-md">7:00 PM</button>
<button class="py-3 px-4 rounded-xl border-[0.5px] border-outline-variant text-on-surface-variant hover:bg-surface-container-low transition-colors font-body-md text-body-md">7:30 PM</button>
<button class="py-3 px-4 rounded-xl border-[0.5px] border-outline-variant text-on-surface-variant hover:bg-surface-container-low transition-colors font-body-md text-body-md">8:00 PM</button>
<button class="py-3 px-4 rounded-xl border-[0.5px] border-outline-variant text-on-surface-variant hover:bg-surface-container-low transition-colors font-body-md text-body-md opacity-50 cursor-not-allowed">8:30 PM</button>
<button class="py-3 px-4 rounded-xl border-[0.5px] border-outline-variant text-on-surface-variant hover:bg-surface-container-low transition-colors font-body-md text-body-md">9:00 PM</button>
</div>
</div>
</div>
<!-- Right Column: Digital Ticket / Summary -->
<div class="md:col-span-5 flex flex-col gap-6">
<div class="glass-panel rounded-2xl p-6 relative overflow-hidden flex flex-col h-full justify-between">
<!-- Ticket Header -->
<div class="flex items-center justify-between border-b-[0.5px] border-outline-variant/50 pb-6 mb-6">
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-1">Reservation at</p>
<h3 class="font-display-accent text-headline-lg text-on-surface">Tastify Flagship</h3>
</div>
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary">restaurant</span>
</div>
</div>
<!-- Ticket Details -->
<div class="flex flex-col gap-6 mb-8">
<div class="flex items-start gap-4">
<span class="material-symbols-outlined text-on-surface-variant mt-1">calendar_today</span>
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant mb-1">Date</p>
<p class="font-body-lg text-body-lg text-on-surface font-semibold">Thursday, Oct 14</p>
</div>
</div>
<div class="flex items-start gap-4">
<span class="material-symbols-outlined text-on-surface-variant mt-1">schedule</span>
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant mb-1">Time</p>
<p class="font-body-lg text-body-lg text-on-surface font-semibold">7:00 PM</p>
</div>
</div>
<div class="flex items-start gap-4">
<span class="material-symbols-outlined text-on-surface-variant mt-1">group</span>
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant mb-1">Party Size</p>
<p class="font-body-lg text-body-lg text-on-surface font-semibold">2 Guests</p>
</div>
</div>
</div>
<!-- Ticket Footer / Actions -->
<div class="mt-auto pt-6 border-t-[0.5px] border-outline-variant/50 border-dashed">
<button class="w-full bg-primary text-on-primary py-4 rounded-xl font-body-md text-body-md font-semibold hover:bg-primary/90 transition-colors flex items-center justify-center gap-2">
                            Continue to Confirmation
                            <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</div>
</div>
</div>
</main>
</body></html>
