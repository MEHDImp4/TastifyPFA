<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
            font-size: inherit;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center overflow-hidden antialiased">
<!-- Top Navigation Anchor (Suppressed shell, but keeping brand presence) -->
<header class="w-full top-0 fixed flex items-center justify-between px-client-margin py-unit-md z-50 bg-background/90 backdrop-blur-none border-b border-outline-variant">
<div class="flex items-center gap-unit-md">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="restaurant_menu">restaurant_menu</span>
<span class="font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg tracking-tighter text-primary">L'ESSENCE</span>
</div>
<div class="md:hidden">
<!-- Mobile nav placeholder if needed, usually hidden on offline screen -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-2xl px-client-margin py-unit-lg md:py-32 flex flex-col items-center justify-center text-center z-10 mt-20 relative">
<!-- Decorative Background Element (Subtle, non-distracting) -->
<div class="absolute inset-0 pointer-events-none flex items-center justify-center opacity-5">
<span class="material-symbols-outlined text-[400px] text-surface-variant" style="font-variation-settings: 'wght' 100;">wifi_off</span>
</div>
<!-- Connection Icon -->
<div class="mb-unit-lg relative">
<div class="w-32 h-32 rounded-full border-2 border-aged-paper/20 flex items-center justify-center bg-surface-container-low shadow-lg relative z-10">
<span class="material-symbols-outlined text-6xl text-outline" data-icon="cloud_off" style="font-variation-settings: 'wght' 100;">cloud_off</span>
</div>
<!-- Subtle pulse effect container -->
<div class="absolute inset-0 rounded-full border border-primary/20 animate-ping opacity-20"></div>
</div>
<!-- Typography Block -->
<h1 class="font-headline-md text-headline-md text-on-background mb-unit-md">Connection Lost</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md mx-auto mb-10 leading-relaxed">
            Your menu and profile preferences are securely cached. Live synchronization is temporarily paused until we re-establish a connection.
        </p>
<!-- Action Button -->
<button class="bg-primary text-ink px-8 py-4 rounded-lg font-ui-button text-ui-button flex items-center gap-unit-sm hover:bg-primary-container transition-colors duration-300 shadow-md border border-aged-paper/10 group" id="retryButton">
<span class="material-symbols-outlined group-hover:-rotate-180 transition-transform duration-500" data-icon="refresh">refresh</span>
<span>Retry Connection</span>
</button>
<!-- Status Indicator (Subtle feedback) -->
<div class="mt-unit-lg flex items-center gap-2 opacity-0 transition-opacity duration-300" id="statusMessage">
<span class="material-symbols-outlined text-amber text-sm animate-spin" data-icon="autorenew">autorenew</span>
<span class="font-ui-data-dense text-ui-data-dense text-on-surface-variant">Attempting to reconnect...</span>
</div>
</main>
<!-- Bottom Navigation Shell (Suppressed as this is a functional intercept screen, but keeping structural space if needed for logic, here fully hidden to prioritize canvas as per mandate) -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const retryButton = document.getElementById('retryButton');
            const statusMessage = document.getElementById('statusMessage');

            retryButton.addEventListener('click', () => {
                // Visual feedback for interaction
                retryButton.style.transform = 'scale(0.97)';
                setTimeout(() => retryButton.style.transform = 'scale(1)', 150);

                // Show status message
                statusMessage.classList.remove('opacity-0');
                
                // Simulate a check (in a real app, this would trigger an API call or network check)
                setTimeout(() => {
                    // Reset status after a delay to simulate failed attempt in offline state
                    statusMessage.classList.add('opacity-0');
                }, 3000);
            });
        });
    </script>
</body></html>
