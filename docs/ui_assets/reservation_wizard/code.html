<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Parchment Stroke / Zero Blur styles */
        .parchment-stroke {
            border: 1px solid theme('colors.aged-paper');
        }
        
        /* Remove tap highlight on mobile */
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Custom scrollbar for time slots */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col pt-20 pb-24 md:pb-0">
<!-- TopAppBar (Client / Medium) -->
<header class="fixed top-0 w-full z-50 bg-background border-b border-outline-variant flex justify-between items-center px-client-margin py-unit-md transition-transform duration-200" id="top-nav">
<button class="text-on-surface-variant font-medium hover:text-primary transition-colors flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary tracking-tight">TASTIFY</h1>
<button class="text-on-surface-variant font-medium hover:text-primary transition-colors font-ui-label-bold text-ui-label-bold uppercase">
            Cart
        </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-4 md:px-client-margin py-unit-lg">
<!-- Reservation Card (Bento/Parchment style) -->
<div class="w-full max-w-2xl bg-surface rounded-xl parchment-stroke flex flex-col overflow-hidden relative">
<!-- Hero Header for Card -->
<div class="h-40 w-full relative border-b border-outline-variant bg-surface-container-high" data-alt="A moody, high-end restaurant interior at night, viewed through a subtle, warm amber lighting. The atmosphere is sophisticated and intimate, featuring dark wooden tables and sleek modern chairs. In the background, soft highlights glint off glassware and polished surfaces, embodying a premium dining experience. The color palette revolves around deep charcoal, rich sienna, and warm amber glows, aligning with an upscale, elegant aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD7liiOUUdr18nDFPvoyeKAPLs-zRBhg0vo_37-tx3cXBW2MU0n-kPg8LdWA41Zn5P5qqP8EIXM9jRuBe6ZnNLgaWWB7OR-72_SGxTHjzYmKTPvoyQRLCC_wJ7UmPvzBHv0SSmq4FkTUCkb_t_MtavWLaZ4utIBY3xoGxX1EBvnYORxrKD3DG_JGD_f9uuE4kwitarpJcTCodn0xNtw07cnViNv8mi2Hn6ZeyY6Ltc4LmKN1pRB8D_OQpOTJRyfmak5cL9SJadJKg'); background-size: cover; background-position: center;">
<div class="absolute inset-0 bg-surface/80"></div> <!-- Opaque overlay, no blur -->
<div class="absolute bottom-unit-md left-unit-lg right-unit-lg flex items-end justify-between">
<div>
<h2 class="font-headline-md text-headline-md text-primary">Book a Table</h2>
<p class="font-body-md text-on-surface-variant mt-unit-xs">Reserve your experience.</p>
</div>
</div>
</div>
<!-- Stepper -->
<div class="flex items-center justify-between px-unit-lg py-unit-md border-b border-outline-variant bg-surface-container">
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-ui-button text-ui-button">1</div>
<span class="font-ui-label-bold text-ui-label-bold text-primary hidden md:inline">Selection</span>
</div>
<div class="h-px bg-outline-variant flex-grow mx-4"></div>
<div class="flex items-center gap-2 opacity-50">
<div class="w-8 h-8 rounded-full border border-outline-variant text-on-surface-variant flex items-center justify-center font-ui-button text-ui-button">2</div>
<span class="font-ui-label-bold text-ui-label-bold text-on-surface-variant hidden md:inline">Details</span>
</div>
<div class="h-px bg-outline-variant flex-grow mx-4"></div>
<div class="flex items-center gap-2 opacity-50">
<div class="w-8 h-8 rounded-full border border-outline-variant text-on-surface-variant flex items-center justify-center font-ui-button text-ui-button">3</div>
<span class="font-ui-label-bold text-ui-label-bold text-on-surface-variant hidden md:inline">Confirm</span>
</div>
</div>
<!-- Step 1: Selection Content -->
<div class="p-unit-lg flex flex-col gap-unit-lg">
<!-- Guest Selector -->
<section class="flex justify-between items-center p-unit-md bg-surface-container-low rounded-lg border border-outline-variant">
<div>
<h3 class="font-ui-label-bold text-ui-label-bold text-on-surface uppercase mb-1">Guests</h3>
<p class="font-body-md text-on-surface-variant text-sm">Number of people</p>
</div>
<div class="flex items-center gap-4">
<button class="w-10 h-10 rounded-full border border-outline-variant flex items-center justify-center text-on-surface hover:border-primary transition-colors">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<span class="font-headline-md text-headline-md text-primary w-8 text-center">2</span>
<button class="w-10 h-10 rounded-full border border-outline-variant flex items-center justify-center text-on-surface hover:border-primary transition-colors">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</section>
<!-- Date Selection (Bento grid style) -->
<section>
<h3 class="font-ui-label-bold text-ui-label-bold text-on-surface uppercase mb-unit-sm">Date</h3>
<div class="grid grid-cols-4 gap-unit-sm">
<!-- Simulated Calendar Row -->
<div class="flex flex-col items-center justify-center p-unit-sm rounded-lg border border-outline-variant cursor-pointer hover:border-primary transition-colors opacity-50">
<span class="font-ui-data-dense text-ui-data-dense text-on-surface-variant">WED</span>
<span class="font-ui-button text-ui-button text-on-surface mt-1">14</span>
</div>
<div class="flex flex-col items-center justify-center p-unit-sm rounded-lg border-2 border-amber bg-surface-container-high cursor-pointer">
<span class="font-ui-data-dense text-ui-data-dense text-primary">THU</span>
<span class="font-ui-button text-ui-button text-primary mt-1">15</span>
</div>
<div class="flex flex-col items-center justify-center p-unit-sm rounded-lg border border-outline-variant cursor-pointer hover:border-primary transition-colors">
<span class="font-ui-data-dense text-ui-data-dense text-on-surface-variant">FRI</span>
<span class="font-ui-button text-ui-button text-on-surface mt-1">16</span>
</div>
<div class="flex flex-col items-center justify-center p-unit-sm rounded-lg border border-outline-variant cursor-pointer hover:border-primary transition-colors">
<span class="font-ui-data-dense text-ui-data-dense text-on-surface-variant">SAT</span>
<span class="font-ui-button text-ui-button text-on-surface mt-1">17</span>
</div>
</div>
</section>
<!-- Time Selection -->
<section>
<h3 class="font-ui-label-bold text-ui-label-bold text-on-surface uppercase mb-unit-sm">Time</h3>
<div class="flex gap-unit-sm overflow-x-auto hide-scrollbar pb-2">
<!-- Chips -->
<button class="shrink-0 px-unit-md py-unit-sm rounded-lg border border-outline-variant font-ui-button text-ui-button text-on-surface hover:border-primary transition-colors">18:00</button>
<button class="shrink-0 px-unit-md py-unit-sm rounded-lg border border-outline-variant font-ui-button text-ui-button text-on-surface hover:border-primary transition-colors">18:30</button>
<button class="shrink-0 px-unit-md py-unit-sm rounded-lg border-2 border-amber bg-surface-container-high font-ui-button text-ui-button text-primary">19:00</button>
<button class="shrink-0 px-unit-md py-unit-sm rounded-lg border border-outline-variant font-ui-button text-ui-button text-on-surface hover:border-primary transition-colors">19:30</button>
<button class="shrink-0 px-unit-md py-unit-sm rounded-lg border border-outline-variant font-ui-button text-ui-button text-on-surface hover:border-primary transition-colors opacity-50 cursor-not-allowed">20:00</button>
<button class="shrink-0 px-unit-md py-unit-sm rounded-lg border border-outline-variant font-ui-button text-ui-button text-on-surface hover:border-primary transition-colors">20:30</button>
</div>
</section>
</div>
<!-- Bottom Action Area (Desktop) -->
<div class="hidden md:flex p-unit-lg border-t border-outline-variant bg-surface justify-end">
<button class="bg-primary text-on-primary font-ui-button text-ui-button px-8 py-3 rounded-lg hover:bg-primary-fixed transition-transform duration-300 hover:-translate-y-0.5 uppercase tracking-widest">
                    Continue
                </button>
</div>
</div>
</main>
<!-- Mobile Sticky CTA -->
<div class="md:hidden fixed bottom-20 left-0 w-full p-4 bg-surface/95 border-t border-outline-variant z-40 backdrop-blur-none">
<button class="w-full bg-primary text-on-primary font-ui-button text-ui-button py-4 rounded-lg hover:bg-primary-fixed transition-transform duration-300 uppercase tracking-widest active:scale-95">
            Continue to Details
        </button>
</div>
<!-- BottomNavBar (Client Mobile) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-4 bg-surface border-t-2 border-outline-variant rounded-t-xl" id="bottom-nav">
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant w-full h-full rounded-lg transition-colors cursor-pointer">
<span class="material-symbols-outlined" data-icon="restaurant_menu">restaurant_menu</span>
<span class="font-ui-label-bold text-ui-label-bold mt-1 text-[10px]">Menu</span>
</div>
<div class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-lg px-unit-md py-unit-xs w-full h-[calc(100%-16px)] cursor-pointer">
<span class="material-symbols-outlined fill" data-icon="calendar_month">calendar_month</span>
<span class="font-ui-label-bold text-ui-label-bold mt-1 text-[10px]">Book</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant w-full h-full rounded-lg transition-colors cursor-pointer">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
<span class="font-ui-label-bold text-ui-label-bold mt-1 text-[10px]">Orders</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant w-full h-full rounded-lg transition-colors cursor-pointer">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-ui-label-bold text-ui-label-bold mt-1 text-[10px]">Profile</span>
</div>
</nav>
<script>
        // Simple top nav hide on scroll down, show on scroll up logic
        let lastScrollY = window.scrollY;
        const topNav = document.getElementById('top-nav');
        
        window.addEventListener('scroll', () => {
            if (window.scrollY > lastScrollY && window.scrollY > 50) {
                topNav.style.transform = 'translateY(-100%)';
            } else {
                topNav.style.transform = 'translateY(0)';
            }
            lastScrollY = window.scrollY;
        });
    </script>
</body></html>
